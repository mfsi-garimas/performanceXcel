<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f6f9fc; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <table width="420" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; padding:32px;">

          <!-- Logo -->
          <tr>
            <td style="padding-bottom:24px;">
              <img src="{{ logo_url }}" width="200" style="display:block;">
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td style="font-size:20px; font-weight:600; color:#0a0a0a; padding-bottom:12px;">
              Reset your password
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="font-size:14px; color:#444; line-height:1.6; padding-bottom:24px;">
              Someone requested a password reset for your account.<br>
              If this was you, click the button below to continue.
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td style="padding-bottom:24px;">
              <a href="{{ reset_link }}"
                 style="display:inline-block; background:#111827; color:#ffffff; 
                        padding:10px 16px; border-radius:6px; font-size:14px; 
                        text-decoration:none; font-weight:500;">
                Reset password →
              </a>
            </td>
          </tr>

          <!-- Secondary text -->
          <tr>
            <td style="font-size:13px; color:#666; line-height:1.6;">
              This link will expire in 30 minutes.<br><br>
              If you didn’t request this, you can safely ignore this email.
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:24px 0;">
              <div style="height:1px; background:#e5e7eb;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="font-size:12px; color:#9ca3af;">
              PerformanceXcel Team
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
